<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<title>Prathamesh ❤️ Rutuja</title>

<style>
:root {
  --gold: #d4af37;
}

/* 🌺 BACKGROUND */
body {
  margin: 0;
  font-family: 'Cinzel', serif;
  color: #fff;
  overflow-x: hidden;

  background:
    linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
    url("bg.jpg");

  background-size: cover;
  background-position: center;
}

/* 💡 LIGHT EFFECT */
.light {
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 200%;
  height: 100%;
  background: radial-gradient(circle, rgba(255,215,0,0.25), transparent 60%);
  opacity: 0;
  transition: opacity 2s ease;
  pointer-events: none;
  z-index: 5;
}

.open .light {
  opacity: 1;
}

/* 🚪 DOORS */
.door {
  position: fixed;
  width: 50%;
  height: 100%;
  top: 0;
  z-index: 10;

  background: linear-gradient(160deg, #000, #2b0000);
  border: 2px solid var(--gold);

  transition: transform 2s cubic-bezier(0.77, 0, 0.18, 1);
  backface-visibility: hidden;
}

.left {
  left: 0;
  transform-origin: left;
}

.right {
  right: 0;
  transform-origin: right;
}

/* 🎬 FULL OPEN FIX */
.open .left {
  transform: perspective(1200px) rotateY(-75deg) translateX(-120%);
}

.open .right {
  transform: perspective(1200px) rotateY(75deg) translateX(120%);
}

/* 🪔 BUTTON */
#enterBtn {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  padding: 14px 30px;

  background: linear-gradient(45deg, gold, #ffd700);
  color: black;

  border-radius: 40px;
  border: none;
  font-weight: bold;
  cursor: pointer;

  z-index: 999;
}

/* CONTENT */
.content {
  opacity: 0;
  transform: scale(0.95) translateY(40px);
  transition: 1.5s ease;
  padding: 80px 20px;
  text-align: center;
}

.open .content {
  opacity: 1;
  transform: scale(1) translateY(0);
}

/* NAMES */
h1 {
  font-family: 'Great Vibes', cursive;
  font-size: 56px;

  background: linear-gradient(45deg, #d4af37, #fff2c7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* COUNTDOWN TITLE */
.count-title {
  margin-top: 20px;
  font-size: 18px;
  color: #ddd;
}

/* COUNTDOWN */
#countdown {
  margin: 10px 0 30px;
  font-size: 20px;
  color: var(--gold);
}

/* CARD */
.card {
  margin: 25px auto;
  padding: 22px;
  max-width: 480px;

  background: rgba(0,0,0,0.6);
  border-radius: 15px;

  border: 1px solid rgba(212,175,55,0.4);
}

/* IMAGE */
img {
  width: 90%;
  max-width: 320px;
  border-radius: 15px;
  border: 2px solid var(--gold);
  margin-top: 20px;
}

/* FOOTER */
.footer {
  margin-top: 60px;
  font-size: 15px;
  color: #ddd;
}
</style>
</head>

<body>

<div class="light"></div>

<div class="door left"></div>
<div class="door right"></div>

<button id="enterBtn">🪔 Enter Invitation 🪔</button>

<div class="content">

<h1>Prathamesh ❤️ Rutuja</h1>

<p class="count-title">
With every passing moment, we move closer to our auspicious Muhurat…
</p>

<div id="countdown"></div>

<div class="card">
  <h3>💍 Wedding Ceremony</h3>
  <p>09 May 2026 • 12:23 PM</p>
</div>

<div class="card">
  <h3>📍 Address</h3>
  <p>Adarsh Lawns, Barshi - 413401</p>
</div>

<div class="card">
  <h3>🗺️ Location</h3>
  <iframe src="https://www.google.com/maps?q=Adarsh+Lawns+Barshi&output=embed"
          width="100%" height="200"></iframe>
</div>

<img src="photo1.jpg" onerror="this.src='https://via.placeholder.com/300'">

<div class="footer">
  <p>
    Two souls, one destiny, bound by love and tradition…  
    Your presence will make our celebration complete 💖
  </p>
</div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const btn = document.getElementById("enterBtn");

  btn.addEventListener("click", function () {
    document.body.classList.add("open");
    btn.style.display = "none";
  });
});

/* COUNTDOWN */
const weddingDate = new Date("2026-05-09T12:23:00").getTime();

function updateCountdown() {
  const now = new Date().getTime();
  const gap = weddingDate - now;

  if (gap <= 0) {
    document.getElementById("countdown").innerHTML = "💍 It's Wedding Time!";
    return;
  }

  const d = Math.floor(gap / (1000*60*60*24));
  const h = Math.floor((gap % (1000*60*60*24))/(1000*60*60));
  const m = Math.floor((gap % (1000*60*60))/(1000*60));
  const s = Math.floor((gap % (1000*60))/1000);

  document.getElementById("countdown").innerHTML =
    `${d} days • ${h} hrs • ${m} min • ${s} sec`;
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
